<!DOCTYPE html>
<html>
<head>
  <title>Chelsea Ogbonna | Interactive Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =======================
   THEME
======================= */

:root {
  --bg: #edf2fb;
  --card: #d7e3fc;
  --accent: #abc4ff;
  --text: #1f2937;
}

/* =======================
   BASE
======================= */

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* =======================
   FLOATING NAV (GAME UI)
======================= */

nav {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 18px;
  padding: 12px 20px;
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);
  border-radius: 999px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  z-index: 100;
}

nav a {
  text-decoration: none;
  color: var(--text);
  font-weight: 500;
  padding: 6px 10px;
  border-radius: 8px;
  transition: 0.2s;
}

nav a:hover {
  background: var(--accent);
  transform: scale(1.1);
}

/* =======================
   HERO (CINEMATIC DEPTH)
======================= */

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10%;
  position: relative;
}

/* floating glow background */
.hero::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: var(--accent);
  filter: blur(120px);
  opacity: 0.4;
  top: -100px;
  left: -100px;
  z-index: 0;
}

.hero-text {
  z-index: 2;
  max-width: 600px;
}

.hero h1 {
  font-size: 64px;
  margin: 0;
  animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.hero-image img {
  width: 320px;
  border-radius: 20px;
  border: 4px solid white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.hero-image img:hover {
  transform: scale(1.08) rotate(2deg);
}

/* =======================
   BUTTONS (GAME FEEL)
======================= */

.button {
  display: inline-block;
  padding: 12px 18px;
  margin-top: 20px;
  background: var(--accent);
  border-radius: 10px;
  text-decoration: none;
  color: black;
  transition: 0.2s;
}

.button:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* =======================
   STATS (XP STYLE CARDS)
======================= */

.stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 80px 10%;
}

.stat {
  background: var(--card);
  padding: 25px;
  border-radius: 16px;
  width: 200px;
  text-align: center;
  transition: 0.3s;
}

.stat:hover {
  transform: translateY(-10px) scale(1.05);
}

/* animated number feel */
.stat h2 {
  font-size: 40px;
  margin: 0;
}

/* =======================
   PROJECTS (INTERACTIVE CARDS)
======================= */

.projects {
  display: flex;
  gap: 20px;
  justify-content: center;
  padding: 40px 10%;
  flex-wrap: wrap;
}

.project {
  width: 300px;
  background: var(--card);
  border-radius: 16px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.project:hover {
  transform: translateY(-12px) rotate(-1deg);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.project .img {
  height: 160px;
  background: #2d3138;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  transition: 0.3s;
}

.project:hover .img {
  transform: scale(1.1);
}

/* =======================
   INTERESTS (BUBBLES)
======================= */

.interests {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 60px;
}

.tag {
  background: var(--card);
  padding: 10px 16px;
  border-radius: 999px;
  transition: 0.2s;
  cursor: pointer;
}

.tag:hover {
  transform: translateY(-6px);
  background: var(--accent);
}

/* =======================
   SCROLL REVEAL (CINEMATIC)
======================= */

section {
  opacity: 0;
  transform: translateY(40px);
  animation: fadeUp 1s forwards;
}

section:nth-child(2) { animation-delay: 0.1s; }
section:nth-child(3) { animation-delay: 0.2s; }
section:nth-child(4) { animation-delay: 0.3s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

footer {
  text-align: center;
  padding: 50px;
  opacity: 0.6;
}

</style>
</head>

<body>

<!-- NAV (floating game UI) -->
<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="projects.html">Projects</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">

  <div class="hero-text">
    <h1>Chelsea Ogbonna</h1>

    <p>
      Biomedical + Mechanical Engineer building systems that feel alive.
    </p>

    <a class="button" href="projects.html">Enter Projects →</a>
  </div>

  <div class="hero-image">
    <img src="Chelseaprofilepics.JPG">
  </div>

</section>

<!-- STATS -->
<section class="stats">

  <div class="stat">
    <h2>5+</h2>
    Projects
  </div>

  <div class="stat">
    <h2>3+</h2>
    Labs
  </div>

  <div class="stat">
    <h2>50+</h2>
    Students
  </div>

</section>

<!-- PROJECTS -->
<section class="projects">

  <div class="project">
    <div class="img">Microfluidics</div>
    <div style="padding:15px;">DLD Device</div>
  </div>

  <div class="project">
    <div class="img">Implant</div>
    <div style="padding:15px;">Wireless Pacemaker</div>
  </div>

</section>

<!-- INTERESTS -->
<section class="interests">

  <div class="tag">Biomedical Devices</div>
  <div class="tag">Microfluidics</div>
  <div class="tag">Embedded Systems</div>

</section>

<footer>
  © 2026 Chelsea Ogbonna
</footer>

</body>
</html>
