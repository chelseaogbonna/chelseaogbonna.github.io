<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chelsea Ogbonna | Interactive Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #0b0f19;
}

/* ===== CITY BACKGROUND ===== */
.city {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(to top, #0b0f19, #1c2333);
  overflow: hidden;
}

/* ROAD */
.road {
  position: absolute;
  bottom: 120px;
  width: 100%;
  height: 140px;
  background: #2a2f3a;
}

/* ROAD LINE */
.line {
  position: absolute;
  top: 50%;
  width: 100%;
  height: 6px;
  background: repeating-linear-gradient(
    90deg,
    #fff 0px,
    #fff 40px,
    transparent 40px,
    transparent 80px
  );
  opacity: 0.3;
}

/* CAR */
.car {
  position: absolute;
  bottom: 160px;
  left: -150px;
  width: 120px;
  height: 60px;
  background: #abc4ff;
  border-radius: 12px;
  animation: drive 10s linear infinite;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(171,196,255,0.5);
}

.car::after {
  content: "";
  position: absolute;
  width: 25px;
  height: 25px;
  background: #fff;
  border-radius: 50%;
  bottom: -10px;
  left: 10px;
}

.car::before {
  content: "";
  position: absolute;
  width: 25px;
  height: 25px;
  background: #fff;
  border-radius: 50%;
  bottom: -10px;
  right: 10px;
}

/* CAR ANIMATION */
@keyframes drive {
  0% { left: -150px; }
  100% { left: 110%; }
}

/* pause on hover */
.car:hover {
  animation-play-state: paused;
}

/* ===== BUILDINGS ===== */
.building {
  position: absolute;
  bottom: 260px;
  width: 120px;
  height: 220px;
  background: #1f2937;
  border: 2px solid #abc4ff;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.building:hover {
  transform: translateY(-10px);
  background: #2b3445;
}

/* POSITIONS */
.b1 { left: 10%; }
.b2 { left: 30%; }
.b3 { left: 50%; }
.b4 { left: 70%; }

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111827;
  padding: 30px;
  border-radius: 15px;
  border: 2px solid #abc4ff;
  display: none;
  color: white;
  width: 300px;
  text-align: center;
}

.popup h2 {
  margin-top: 0;
  color: #abc4ff;
}

.close {
  margin-top: 15px;
  padding: 8px 14px;
  background: #abc4ff;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}

/* TITLE */
.title {
  position: absolute;
  top: 40px;
  width: 100%;
  text-align: center;
  color: white;
}

.title h1 {
  margin: 0;
  font-size: 42px;
}

.title p {
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="city">

  <!-- TITLE -->
  <div class="title">
    <h1>Chelsea Ogbonna</h1>
    <p>Click buildings or pause the car 🚗</p>
  </div>

  <!-- BUILDINGS (NAV SECTIONS) -->
  <div class="building b1" onclick="openPopup('About Me')"></div>
  <div class="building b2" onclick="openPopup('Projects')"></div>
  <div class="building b3" onclick="openPopup('Leadership')"></div>
  <div class="building b4" onclick="openPopup('Contact')"></div>

  <!-- ROAD -->
  <div class="road">
    <div class="line"></div>
  </div>

  <!-- CAR -->
  <div class="car" onclick="openPopup('Welcome! Explore the city to view my work 🚗')"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <h2 id="popupTitle"></h2>
  <p>This is where your section content would load.</p>
  <button class="close" onclick="closePopup()">Close</button>
</div>

<script>
function openPopup(text) {
  document.getElementById("popupTitle").innerText = text;
  document.getElementById("popup").style.display = "block";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
