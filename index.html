<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chelsea Ogbonna | Cinematic Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: radial-gradient(circle at center, #1c2333, #0b0f19);
}

.hero h1 {
  font-size: 70px;
  animation: fadeUp 1.2s ease;
}

.hero p {
  opacity: 0.7;
  animation: fadeUp 1.6s ease;
}

/* SCROLL SECTIONS */
.section {
  min-height: 100vh;
  padding: 100px;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* CARDS */
.card {
  background: #1f2937;
  padding: 30px;
  border-radius: 15px;
  margin-top: 20px;
  border: 1px solid #abc4ff;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* FLOATING PARTICLES */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #abc4ff;
  border-radius: 50%;
  opacity: 0.3;
  animation: float 10s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100vh); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>Chelsea Ogbonna</h1>
    <p>Biomedical • Mechanical • Research Engineer</p>
  </div>
</div>

<div class="section">
  <h2>Projects</h2>
  <div class="card">Microfluidic Device</div>
  <div class="card">Implantable Systems</div>
  <div class="card">Terrain Analysis Platform</div>
</div>

<div class="section">
  <h2>Leadership</h2>
  <div class="card">NSBE Academic Chair</div>
</div>

<div class="section">
  <h2>Contact</h2>
  <div class="card">Email • LinkedIn • GitHub</div>
</div>

<script>
const sections = document.querySelectorAll(".section");

function reveal() {
  sections.forEach(s => {
    const top = s.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      s.classList.add("visible");
    }
  });
}

window.addEventListener("scroll", reveal);
reveal();

// particles
for (let i = 0; i < 30; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.top = Math.random() * window.innerHeight + "px";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
