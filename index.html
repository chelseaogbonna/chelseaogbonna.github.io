<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BME Body Map Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #0b0f19, #05070c);
  color: white;
  overflow: hidden;
}

/* BODY */
.body {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url('https://i.imgur.com/3ZQ3ZQm.png'); /* simple silhouette vibe */
  background-size: cover;
  opacity: 0.9;
}

/* ORGANS */
.organ {
  position: absolute;
  padding: 12px 16px;
  background: rgba(171,196,255,0.15);
  border: 2px solid #abc4ff;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(5px);
}

.organ:hover {
  transform: scale(1.1);
  background: rgba(171,196,255,0.35);
}

.brain { top: 15%; left: 50%; transform: translateX(-50%); }
.heart { top: 40%; left: 50%; transform: translateX(-50%); }
.lungs { top: 38%; left: 35%; }
.bone { top: 65%; left: 55%; }
.lab { top: 65%; left: 30%; }

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: #0f172a;
  border: 2px solid #abc4ff;
  padding: 25px;
  border-radius: 15px;
  display: none;
  width: 320px;
}

button {
  margin-top: 10px;
  background: #abc4ff;
  border: none;
  padding: 8px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="body">

  <div class="organ brain" onclick="openP('Brain')">🧠 Brain</div>
  <div class="organ heart" onclick="openP('Heart')">❤️ Heart</div>
  <div class="organ lungs" onclick="openP('Lungs')">🫁 Lungs</div>
  <div class="organ bone" onclick="openP('Biomechanics')">🦴 Bone</div>
  <div class="organ lab" onclick="openP('Microfluidics')">🧫 Lab</div>

</div>

<div class="popup" id="p">
  <h2 id="t"></h2>
  <p id="c"></p>
  <button onclick="closeP()">Close</button>
</div>

<script>
function openP(x){
  document.getElementById("p").style.display="block";
  document.getElementById("t").innerText=x;

  document.getElementById("c").innerText =
    x==="Brain" ? "ML + modeling + signal processing" :
    x==="Heart" ? "Implantable + pacemaker systems" :
    x==="Lungs" ? "Fluid dynamics + airflow systems" :
    x==="Biomechanics" ? "Stress, FEA, materials" :
    "DLD microfluidics + cell separation";
}
function closeP(){
  document.getElementById("p").style.display="none";
}
</script>

</body>
</html>
