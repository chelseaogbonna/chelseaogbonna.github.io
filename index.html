<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chelsea Ogbonna | Interactive BME Portfolio</title>

<style>
:root {
  --bg: #edf2fb;
  --bg2: #e2eafc;

  --card: #d7e3fc;
  --card-hover: #ccdbfd;

  --text: #1f2937;
  --muted: #4b5563;

  --accent: #abc4ff;
  --accent-soft: #b6ccfe;
  --border: #c1d3fe;

  --nav-bg: rgba(237, 242, 251, 0.9);
  --project-hover: #dde6b8;

  /* Game Specific Cellular Fluorescent Markers aligned with your palette */
  --erythrocyte-red: rgba(239, 68, 68, 0.65);
  --buffer-blue: rgba(79, 172, 254, 0.65);
}

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  user-select: none;
}

/* ===== MICROFLUIDIC LAB-ON-A-CHIP LANDSCAPE ===== */
.bio-matrix {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
  overflow: hidden;
}

/* DIAGNOSTIC MICROFLUIDIC CHANNEL */
.fluid-channel {
  position: absolute;
  bottom: 120px;
  width: 100%;
  height: 100px;
  background: rgba(255, 255, 255, 0.5);
  border-top: 3px dashed var(--border);
  border-bottom: 3px dashed var(--border);
  box-shadow: inset 0 0 20px rgba(171, 196, 255, 0.2);
}

/* FLOATING TARGET CELL COURIER */
.cell-courier {
  position: absolute;
  bottom: 135px;
  left: -150px;
  width: 70px;
  height: 70px;
  background: radial-gradient(circle at 30% 30%, var(--accent), var(--accent-soft));
  border-radius: 50%;
  animation: cellular-flow 12s linear infinite;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(171, 196, 255, 0.8), inset -5px -5px 15px rgba(0,0,0,0.05);
  border: 2px solid white;
}

/* Surface receptor proteins on the running cell */
.cell-courier::before, .cell-courier::after {
  content: "";
  position: absolute;
  background: var(--accent-soft);
  border-radius: 50%;
}
.cell-courier::before { width: 10px; height: 10px; top: -5px; left: 30px; box-shadow: 0 0 10px var(--accent); }
.cell-courier::after { width: 8px; height: 8px; bottom: 15px; right: -4px; box-shadow: 0 0 10px var(--accent); }

/* FLOW MECHANICS SPEED */
@keyframes cellular-flow {
  0% { left: -100px; transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(180deg); }
  100% { left: 110%; transform: translateY(0px) rotate(360deg); }
}

/* Trap cell flow on cursor hover */
.cell-courier:hover {
  animation-play-state: paused;
  box-shadow: 0 0 35px var(--accent), inset -5px -5px 15px rgba(0,0,0,0.1);
  background: var(--project-hover);
}

/* ===== BIOLOGICAL INCUBATION PODS / LAB STATIONS ===== */
.bio-vessel {
  position: absolute;
  bottom: 260px;
  width: 120px;
  height: 180px;
  background: rgba(255, 255, 255, 0.65);
  border: 2px solid var(--border);
  backdrop-filter: blur(8px);
  border-radius: 40px 40px 20px 20px; /* Fluidic chamber appearance */
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: 0 10px 25px rgba(193, 211, 254, 0.15);
}

.bio-vessel:hover {
  transform: translateY(-15px) scale(1.05);
  background: var(--card);
  border-color: var(--accent);
  box-shadow: 0 15px 35px rgba(171, 196, 255, 0.4);
}

/* Highly Fluorescent Bioreactor Core */
.vessel-core {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent-soft) 20%, transparent 80%);
  border: 2px dashed var(--border);
  margin-bottom: 15px;
  opacity: 0.8;
  transition: 0.3s ease;
}

.bio-vessel:hover .vessel-core {
  opacity: 1;
  transform: rotate(45deg) scale(1.15);
  background: white;
  border-color: var(--accent);
}

.vessel-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
  text-transform: uppercase;
}

/* CHIP MATRIX POSITION VALVES */
.node-about { left: 12%; }
.node-projects { left: 34%; }
.node-research { left: 56%; }
.node-contact { left: 78%; }

/* ===== LAB UTILITY OVERLAY MODAL ===== */
.bio-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: white;
  padding: 40px;
  border-radius: 26px;
  border: 3px solid var(--accent);
  display: none;
  color: var(--text);
  width: 380px;
  text-align: center;
  box-shadow: 0 30px 60px rgba(27, 38, 59, 0.15);
  z-index: 1000;
  opacity: 0;
  transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.15);
}

.bio-popup.active {
  display: block;
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.bio-popup h2 {
  margin-top: 0;
  color: var(--text);
  font-weight: 800;
  font-size: 24px;
  letter-spacing: -0.5px;
}

.bio-popup p {
  color: var(--muted);
  line-height: 1.6;
  font-size: 14.5px;
}

.close-btn {
  margin-top: 25px;
  padding: 12px 28px;
  background: var(--accent);
  border: none;
  color: var(--text);
  font-weight: 700;
  cursor: pointer;
  border-radius: 14px;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 13px;
}

.close-btn:hover {
  transform: scale(1.05);
  background: var(--accent-soft);
  box-shadow: 0 5px 15px rgba(171, 196, 255, 0.4);
}

/* TERMINAL SYSTEM HEADER PANEL */
.header-panel {
  position: absolute;
  top: 60px;
  width: 100%;
  text-align: center;
  pointer-events: none;
}

.header-panel h1 {
  margin: 0;
  font-size: 44px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text);
}

.header-panel p {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  margin-top: 8px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
</style>
</head>

<body>

<div class="bio-matrix">

  <div class="header-panel">
    <h1>Chelsea Ogbonna</h1>
    <p>Biomedical Engineering Platform // Capture the moving target cell or load a valve node</p>
  </div>

  <!-- VALVE NODE: ABOUT -->
  <div class="bio-vessel node-about" onclick="openPopup('About Me', 'Passionate about engineering elegant, microscopic solutions to macroscopic physiological challenges. Bridging the gap between cellular mechanics and real-world clinical diagnostic platforms.')">
    <div class="vessel-core"></div>
    <div class="vessel-label">About Me</div>
  </div>

  <!-- VALVE NODE: PROJECTS -->
  <div class="bio-vessel node-projects" onclick="openPopup('Engineering Projects', 'From hardware prototypes to smart tracking arrays. Deep dives into wire directed energy deposition variations, microfluidic separation devices, and wearable kinematics meshes.')">
    <div class="vessel-core"></div>
    <div class="vessel-label">Projects</div>
  </div>

  <!-- VALVE NODE: RESEARCH -->
  <div class="bio-vessel node-research" onclick="openPopup('Research Focus', 'Investigating cutting-edge cell-free protein syntheses, responsive sequence-dependent programmable hydrogels, dynamic biomaterial degradation kinetics, and micro-target isolation systems.')">
    <div class="vessel-core"></div>
    <div class="vessel-label">Research</div>
  </div>

  <!-- VALVE NODE: CONTACT -->
  <div class="bio-vessel node-contact" onclick="openPopup('Connect Valve', 'Let\'s collaborate on the next wave of bio-hardware innovation. Secure terminal link active for discussing research integration or development opportunities.')">
    <div class="vessel-core"></div>
    <div class="vessel-label">Contact</div>
  </div>

  <!-- FLUID FLOW ARCHITECTURE -->
  <div class="fluid-channel"></div>

  <!-- TARGET CAPTURABLE CELL COURIER -->
  <div class="cell-courier" onclick="openPopup('Cellular Assays Trapped', 'Target isolated successfully! Micro-particle flow paused inside the diagnostic terminal chamber grid. Explore the chamber nodes to evaluate my engineering portfolio.')"></div>

</div>

<!-- INTERACTIVE POPUP MODULE -->
<div class="bio-popup" id="bioPopup">
  <h2 id="popupTitle"></h2>
  <p id="popupContent"></p>
  <button class="close-btn" onclick="closePopup()">Resume Assay Flow</button>
</div>

<script>
function openPopup(title, content) {
  const popup = document.getElementById("bioPopup");
  document.getElementById("popupTitle").innerText = title;
  document.getElementById("popupContent").innerText = content;
  
  popup.style.display = "block";
  setTimeout(() => {
    popup.classList.add("active");
  }, 10);
}

function closePopup() {
  const popup = document.getElementById("bioPopup");
  popup.classList.remove("active");
  setTimeout(() => {
    popup.style.display = "none";
  }, 250);
}
</script>

</body>
</html>
