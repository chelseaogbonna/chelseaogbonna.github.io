<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Microfluidic Portfolio</title>

<style>
body {
  margin: 0;
  background: #050814;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

/* CHIP */
.chip {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(120deg,#0b0f19,#111827);
  position: relative;
}

/* CHANNELS */
.channel {
  position: absolute;
  background: rgba(171,196,255,0.15);
  border: 2px solid #abc4ff;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.channel:hover {
  background: rgba(171,196,255,0.35);
}

.inlet { top: 20%; left: 10%; width: 150px; height: 80px; }
.filter { top: 40%; left: 40%; width: 200px; height: 100px; }
.separation { top: 60%; left: 65%; width: 200px; height: 100px; }
.outlet { top: 75%; left: 20%; width: 150px; height: 80px; }

/* PARTICLES */
.particle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #abc4ff;
  border-radius: 50%;
  animation: flow 6s linear infinite;
}

@keyframes flow {
  0% { transform: translate(0,0); opacity: 1; }
  100% { transform: translate(800px,300px); opacity: 0; }
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: #0f172a;
  padding: 25px;
  border: 2px solid #abc4ff;
  display: none;
  width: 320px;
}
</style>
</head>

<body>

<div class="chip">

  <div class="channel inlet" onclick="openP('Inlet')">INLET</div>
  <div class="channel filter" onclick="openP('Filter')">FILTER ZONE</div>
  <div class="channel separation" onclick="openP('Separation')">DLD ARRAY</div>
  <div class="channel outlet" onclick="openP('Outlet')">OUTLET</div>

  <div class="particle"></div>
  <div class="particle" style="animation-delay:2s"></div>
  <div class="particle" style="animation-delay:4s"></div>

</div>

<div class="popup" id="p">
  <h2 id="t"></h2>
  <p id="c"></p>
  <button onclick="closeP()">Close</button>
</div>

<script>
function openP(x){
  document.getElementById("p").style.display="block";
  document.getElementById("t").innerText=x;

  document.getElementById("c").innerText =
    x==="Inlet" ? "Sample introduction + flow control" :
    x==="Filter" ? "Size-based separation mechanics" :
    x==="Separation" ? "DLD microfluidic design (your core project)" :
    "Collected purified output (syncytial knots / cells)";
}
function closeP(){
  document.getElementById("p").style.display="none";
}
</script>

</body>
</html>
