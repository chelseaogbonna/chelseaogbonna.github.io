<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neha Nepal | Interactive Mechanical Engineering Portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <style>
:root {
  /* Sleek, professional engineering colors */
  --bg: #edf2fb;
  --bg2: #e2eafc;
  --card: #d7e3fc;
  --card-hover: #ccdbfd;
  --text: #0a192f;
  --muted: #4a5568;
  --accent: #abc4ff;
  --accent-soft: #b6ccfe;
  --border: #c1d3fe;
  
  /* System highlights */
  --thermal-orange: rgba(249, 115, 22, 0.1);
  --aerospace-blue: rgba(59, 130, 246, 0.1);
}

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg);
  color: var(--text);
  user-select: none;
}

/* ===== MECHANICAL SIMULATION GRID & LANDSCAPE ===== */
.sim-matrix {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: radial-gradient(circle at center, var(--bg) 0%, var(--bg2) 100%);
  overflow: hidden;
}

/* FLUID DYNAMICS / WIND TUNNEL CHANNEL */
.fluid-channel {
  position: absolute;
  bottom: 120px;
  width: 100%;
  height: 100px;
  background: rgba(255, 255, 255, 0.4);
  border-top: 2px dashed var(--accent);
  border-bottom: 2px dashed var(--accent);
  box-shadow: inset 0 0 20px rgba(171, 196, 255, 0.2);
}

/* FLOATING SPACECRAFT COURIER / TELEMETRY PAYLOAD */
.spacecraft-courier {
  position: absolute;
  bottom: 135px;
  left: -150px;
  width: 70px;
  height: 70px;
  background: radial-gradient(circle at 30% 30%, #abc4ff, #4facfe);
  border-radius: 35% 65% 65% 35% / 35% 35% 65% 65%; /* Mechanical aerodynamic shape */
  animation: atmospheric-flow 10s linear infinite;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(79, 172, 254, 0.5), inset -5px -5px 15px rgba(0,0,0,0.1);
  border: 2px solid rgba(255, 255, 255, 0.7);
}

/* Solar panels / sensor arrays protruding from the courier */
.spacecraft-courier::before, .spacecraft-courier::after {
  content: "";
  position: absolute;
  background: #4facfe;
}
.spacecraft-courier::before { width: 14px; height: 6px; top: 32px; left: -10px; box-shadow: 0 0 10px #abc4ff; }
.spacecraft-courier::after { width: 6px; height: 14px; top: -10px; left: 32px; box-shadow: 0 0 10px #abc4ff; }

/* WIND TUNNEL FLOW ANIMATION */
@keyframes atmospheric-flow {
  0% { left: -100px; transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(15deg); }
  100% { left: 110%; transform: translateY(0px) rotate(0deg); }
}

.spacecraft-courier:hover {
  animation-play-state: paused;
  box-shadow: 0 0 35px #4facfe, inset -5px -5px 15px rgba(0,0,0,0.15);
  background: #ccdbfd;
}

/* ===== MECHANICAL VALVES / CHAMBERS ===== */
.sim-vessel {
  position: absolute;
  bottom: 260px;
  width: 130px;
  height: 170px;
  background: rgba(255, 255, 255, 0.7);
  border: 2px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  backdrop-filter: blur(5px);
}

.sim-vessel:hover {
  transform: translateY(-15px) scale(1.05);
  background: var(--card);
  border-color: var(--accent);
  box-shadow: 0 15px 30px rgba(171, 196, 255, 0.5);
}

/* Rotatable Actuator Core */
.vessel-core {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: radial-gradient(circle, var(--accent) 10%, transparent 80%);
  border: 2px dashed var(--accent);
  margin-bottom: 15px;
  transition: 0.3s;
}

.sim-vessel:hover .vessel-core {
  transform: rotate(90deg) scale(1.1);
  background: #ffffff;
}

.vessel-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
  text-transform: uppercase;
  text-align: center;
  padding: 0 5px;
}

/* POSITIONING CONFIGURATION */
.node-profile { left: 10%; }
.node-focus { left: 32%; }
.node-projects { left: 54%; }
.node-experience { left: 76%; }

/* ===== INTERACTIVE EXPANDED TELEMETRY PANEL ===== */
.sim-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
  padding: 35px;
  border-radius: 24px;
  border: 3px solid var(--accent);
  display: none;
  color: var(--text);
  width: 580px;
  max-width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s ease;
}

.sim-popup.active {
  display: block;
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

.sim-popup h2 {
  margin-top: 0;
  color: var(--text);
  font-size: 24px;
  border-bottom: 2px solid var(--bg2);
  padding-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sim-popup h3 {
  color: #1e3a8a;
  font-size: 16px;
  margin: 15px 0 5px 0;
}

.sim-popup p {
  color: var(--muted);
  line-height: 1.6;
  font-size: 14px;
  margin-top: 5px;
}

/* DATA CARD ARRANGEMENTS */
.telemetry-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 20px 0;
}

.telemetry-card {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 14px;
  text-align: center;
}

.telemetry-card strong {
  display: block;
  font-size: 18px;
  color: var(--text);
}

.telemetry-card span {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
}

.chamber-block {
  background: var(--bg2);
  border-left: 4px solid var(--accent);
  padding: 15px;
  border-radius: 0 12px 12px 0;
  margin-bottom: 12px;
}

.tag {
  display: inline-block;
  background: white;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 8px;
  font-size: 11px;
  border-radius: 6px;
  margin-right: 4px;
  margin-top: 5px;
  font-weight: 600;
}

/* BUTTON CONTROLS */
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 18px;
  background: white;
  border: 1px solid var(--border);
  color: var(--text);
  text-decoration: none;
  font-weight: 700;
  font-size: 12px;
  border-radius: 10px;
  transition: 0.2s;
  text-transform: uppercase;
}

.btn:hover {
  background: var(--card);
}

.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
}

.btn.primary:hover {
  background: var(--accent-soft);
}

.dismiss-btn {
  margin-top: 20px;
  padding: 12px 28px;
  background: var(--text);
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 0.5px;
}

.dismiss-btn:hover {
  background: var(--muted);
}

/* HEADER PANEL OVERLAY */
.system-header {
  position: absolute;
  top: 50px;
  width: 100%;
  text-align: center;
  pointer-events: none;
}

.system-header h1 {
  margin: 0;
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}

.system-header p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* CUSTOM SCROLLBAR FOR DATA PANELS */
.sim-popup::-webkit-scrollbar { width: 4px; }
.sim-popup::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

/* =========================================================
   MODAL OVERLAY MECHANICAL RIG
========================================================= */
function showPopup(title, htmlContent) {
  const popup = document.getElementById("simPopup");
  document.getElementById("simTitle").innerText = title;
  document.getElementById("simDynamicContent").innerHTML = htmlContent;
  
  popup.style.display = "block";
  setTimeout(() => {
    popup.classList.add("active");
  }, 10);
}

function closePopup() {
  const popup = document.getElementById("simPopup");
  popup.classList.remove("active");
  setTimeout(() => {
    popup.style.display = "none";
  }, 250);
}
