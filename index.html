<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BME HUD Portfolio</title>

<style>
body {
  margin: 0;
  background: #000814;
  font-family: Arial;
  color: #abc4ff;
  overflow: hidden;
}

/* GRID HUD */
.hud {
  width: 100vw;
  height: 100vh;
  background: radial-gradient(circle, #0b0f19, black);
  position: relative;
}

/* MODULES */
.module {
  position: absolute;
  width: 200px;
  height: 120px;
  border: 2px solid #abc4ff;
  background: rgba(171,196,255,0.05);
  padding: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.module:hover {
  transform: scale(1.1);
  background: rgba(171,196,255,0.2);
}

.m1 { top: 20%; left: 10%; }
.m2 { top: 40%; left: 40%; }
.m3 { top: 60%; left: 70%; }
.m4 { top: 75%; left: 20%; }

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: #0f172a;
  border: 2px solid #abc4ff;
  padding: 25px;
  display: none;
  width: 320px;
}
</style>
</head>

<body>

<div class="hud">

  <div class="module m1" onclick="openP('Biomechanics')">BIOMECH SYSTEM</div>
  <div class="module m2" onclick="openP('Microfluidics')">FLUID SYSTEM</div>
  <div class="module m3" onclick="openP('Implants')">IMPLANT SYSTEM</div>
  <div class="module m4" onclick="openP('Embedded')">EMBEDDED SYSTEM</div>

</div>

<div class="popup" id="p">
  <h2 id="t"></h2>
  <p id="c"></p>
  <button onclick="closeP()">Close</button>
</div>

<script>
function openP(x){
  document.getElementById("p").style.display="block";
  document.getElementById("t").innerText=x;

  document.getElementById("c").innerText =
    x==="Biomechanics" ? "FEA, materials, structural modeling" :
    x==="Microfluidics" ? "DLD, flow systems, separation tech" :
    x==="Implants" ? "Pacemaker + wireless power systems" :
    "Sensors + real-time data systems";
}
function closeP(){
  document.getElementById("p").style.display="none";
}
</script>

</body>
</html>
