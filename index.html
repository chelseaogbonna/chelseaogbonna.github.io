<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chelsea Ogbonna | Game Portfolio</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b0f19;
  font-family: Arial;
}

/* MAP */
#map {
  width: 2000px;
  height: 1200px;
  background: linear-gradient(#1c2333, #0b0f19);
  position: relative;
}

/* PLAYER */
#player {
  width: 40px;
  height: 40px;
  background: #abc4ff;
  position: absolute;
  border-radius: 8px;
  box-shadow: 0 0 20px #abc4ff;
}

/* BUILDINGS */
.building {
  width: 140px;
  height: 140px;
  background: #1f2937;
  border: 2px solid #abc4ff;
  position: absolute;
  border-radius: 12px;
  color: white;
  text-align: center;
  padding-top: 55px;
  font-size: 14px;
  transition: 0.2s;
}

.building:hover {
  transform: scale(1.05);
}

/* POSITIONS */
#about { top: 200px; left: 300px; }
#projects { top: 500px; left: 900px; }
#leadership { top: 800px; left: 500px; }
#contact { top: 300px; left: 1400px; }

/* UI */
#hint {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: white;
  opacity: 0.7;
}

/* POPUP */
#popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111827;
  border: 2px solid #abc4ff;
  padding: 25px;
  border-radius: 12px;
  color: white;
  display: none;
  width: 320px;
}

button {
  margin-top: 10px;
  padding: 8px 12px;
  background: #abc4ff;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="map">

  <div id="player"></div>

  <div class="building" id="about">About</div>
  <div class="building" id="projects">Projects</div>
  <div class="building" id="leadership">Leadership</div>
  <div class="building" id="contact">Contact</div>

</div>

<div id="hint">
  Move: WASD / Arrow Keys | Press E near buildings
</div>

<div id="popup">
  <h2 id="title"></h2>
  <p>This section will load your content here.</p>
  <button onclick="closePopup()">Close</button>
</div>

<script>
let player = document.getElementById("player");

let x = 100;
let y = 100;

const speed = 10;

document.addEventListener("keydown", (e) => {

  if (e.key === "ArrowRight" || e.key === "d") x += speed;
  if (e.key === "ArrowLeft" || e.key === "a") x -= speed;
  if (e.key === "ArrowUp" || e.key === "w") y -= speed;
  if (e.key === "ArrowDown" || e.key === "s") y += speed;

  player.style.left = x + "px";
  player.style.top = y + "px";

  if (e.key === "e") checkInteraction();
});

function checkInteraction() {
  const buildings = ["about","projects","leadership","contact"];

  buildings.forEach(id => {
    let b = document.getElementById(id);
    let rect1 = player.getBoundingClientRect();
    let rect2 = b.getBoundingClientRect();

    let overlap =
      !(rect1.right < rect2.left ||
        rect1.left > rect2.right ||
        rect1.bottom < rect2.top ||
        rect1.top > rect2.bottom);

    if (overlap) {
      openPopup(id);
    }
  });
}

function openPopup(id) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("title").innerText = id.toUpperCase();
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
