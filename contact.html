      margin-bottom: 20px;
      transition: 0.2s ease;
    }

    .card:hover {
      background: var(--card-hover);
    }

    .card a {
      color: var(--link);
      text-decoration: none;
    }

    .card a:hover {
      text-decoration: underline;
    }

    h2 {
      margin-top: 0;
    }

    p {
